<a routerLink="/" class="top-back-link">← {{ languageService.t('backHome') }}</a>
<section class="login-page">
  <div class="login-card">
    <h1>{{ languageService.t('login') }}</h1>
    <p class="subtitle">{{ languageService.t('authLoginSubtitle') }}</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label for="email">{{ languageService.t('email') }}</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [placeholder]="languageService.t('emailPlaceholderLogin')" />

        <small class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          {{ languageService.t('invalidEmail') }}
        </small>
      </div>

      <div class="form-group">
        <label for="password">{{ languageService.t('password') }}</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          [placeholder]="languageService.t('passwordPlaceholderLogin')" />

        <small class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          {{ languageService.t('passwordRequired') }}
        </small>
      </div>

      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? languageService.t('loggingIn') : languageService.t('loginButton') }}
      </button>
    </form>

    <a routerLink="/register" class="back-link">{{ languageService.t('noAccountRegister') }}</a>
  </div>
</section>
