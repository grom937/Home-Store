<a routerLink="/" class="top-back-link">← Strona główna</a>
<section class="login-page">
  <div class="login-card">
    <h1>Logowanie</h1>
    <p class="subtitle">Zaloguj się do Home Store.</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="np. name@homestore.pl" />

        <small class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Podaj poprawny adres email.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Hasło</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="podaj hasło" />

        <small class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Hasło jest wymagane.
        </small>
      </div>

      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Logowanie...' : 'Zaloguj się' }}
      </button>
    </form>

    <a routerLink="/register" class="back-link">Nie masz konta? Zarejestruj się</a>
  </div>
</section>
