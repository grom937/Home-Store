<button class="back-button" (click)="goHome()">
  ← {{ languageService.t('backHome') }}
</button>

<section class="product-list-page">
  <h1>{{ languageService.t('productList') }}</h1>

  <div class="filters-card">
    <div class="filters-grid">
      <div class="filter-group">
        <label for="search">{{ languageService.t('search') }}</label>
        <input
          id="search"
          type="text"
          [(ngModel)]="searchTerm"
          (input)="applyFilters()"
          [placeholder]="languageService.t('searchPlaceholder')" />
      </div>

      <div class="filter-group">
        <label for="category">{{ languageService.t('category') }}</label>
        <select
          id="category"
          [(ngModel)]="selectedCategoryId"
          (change)="applyFilters()">
          <option value="">{{ languageService.t('all') }}</option>
          <option *ngFor="let category of categories" [value]="category.id">
            {{ languageService.categoryName(category.name) }}
          </option>
        </select>
      </div>

      <div class="filter-group">
        <label for="productType">{{ languageService.t('productType') }}</label>
        <select
          id="productType"
          [(ngModel)]="selectedProductType"
          (change)="applyFilters()">
          <option value="">{{ languageService.t('all') }}</option>
          <option *ngFor="let type of productTypes" [value]="type.value">
            {{ getProductTypeLabel(type) }}
          </option>
        </select>
      </div>

      <div class="filter-group">
        <label for="minPrice">{{ languageService.t('priceFrom') }}</label>
        <input
          id="minPrice"
          type="number"
          min="0"
          [(ngModel)]="minPrice"
          (input)="applyFilters()"
          placeholder="500" />
      </div>

      <div class="filter-group">
        <label for="maxPrice">{{ languageService.t('priceTo') }}</label>
        <input
          id="maxPrice"
          type="number"
          min="0"
          [(ngModel)]="maxPrice"
          (input)="applyFilters()"
          placeholder="2000" />
      </div>

      <div class="filter-group">
        <label for="sort">{{ languageService.t('sort') }}</label>
        <select
          id="sort"
          [(ngModel)]="sortOption"
          (change)="applyFilters()">
          <option value="">{{ languageService.t('defaultSort') }}</option>
          <option value="price-asc">{{ languageService.t('priceAsc') }}</option>
          <option value="price-desc">{{ languageService.t('priceDesc') }}</option>
        </select>
      </div>
    </div>

    <button class="clear-button" type="button" (click)="clearFilters()">
      {{ languageService.t('clearFilters') }}
    </button>
  </div>

  <p *ngIf="loading" class="info-message">
    {{ languageService.t('loadingProducts') }}
  </p>

  <p *ngIf="error" class="error-message">
    {{ error }}
  </p>

  <div *ngIf="!loading && !error && filteredProducts.length === 0" class="info-message">
    {{ languageService.t('noProducts') }}
  </div>

  <div *ngIf="!loading && !error && filteredProducts.length > 0" class="product-grid">
    <app-product-card
      *ngFor="let product of filteredProducts"
      [product]="product">
    </app-product-card>
  </div>
</section>
