<section class="product-details-page">
  <a routerLink="/products" class="back-link">← Wróć do listy produktów</a>

  <p *ngIf="loading" class="info-message">
    Ładowanie szczegółów produktu...
  </p>

  <p *ngIf="error" class="error-message">
    {{ error }}
  </p>

  <div *ngIf="!loading && !error && product" class="product-details-card">
    <div class="image-section">
      <img
        [src]="product.imageUrl || 'https://via.placeholder.com/600x400?text=Brak+zdjecia'"
        [alt]="product.name"
        class="product-image"
      />
    </div>

    <div class="content-section">
      <h1>{{ product.name }}</h1>

      <p class="type">Typ produktu: {{ product.productType }}</p>
      <p class="description">
        {{ product.description || 'Brak opisu produktu.' }}
      </p>
      <p class="price">{{ product.price | currency:'PLN' }}</p>
      <p class="quantity">Dostępna ilość: {{ product.quantity }}</p>
    </div>
  </div>
</section>
