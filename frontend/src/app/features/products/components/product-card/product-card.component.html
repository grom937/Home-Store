<div class="product-card">
  <div class="image-wrapper">
    <img
      [src]="product.imageUrl || 'https://via.placeholder.com/600x400?text=Brak+zdjecia'"
      [alt]="product.name"
      class="product-image"
    />
  </div>

  <div class="product-content">
    <h3>{{ product.name }}</h3>

    <p class="description">
      {{ product.description || 'Brak opisu produktu.' }}
    </p>

    <p class="price">{{ product.price | currency:'PLN' }}</p>

    <a [routerLink]="['/products', product.id]" class="details-button">
      Zobacz szczegóły
    </a>
  </div>
</div>
