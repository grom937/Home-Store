<nav class="navbar">
  <div class="navbar-content">
    <a routerLink="/" class="logo">Home Store</a>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Strona główna
      </a>

      <a routerLink="/products" routerLinkActive="active">
        Produkty
      </a>

      <a *ngIf="!authService.isLoggedIn()" routerLink="/register" routerLinkActive="active">
        Rejestracja
      </a>

      <a *ngIf="!authService.isLoggedIn()" routerLink="/login" routerLinkActive="active">
        Logowanie
      </a>

      <a *ngIf="authService.isAdmin()" routerLink="/admin/products" routerLinkActive="active">
        Zarządzanie produktami
      </a>

      <a *ngIf="authService.isAdmin()" routerLink="/admin/orders" routerLinkActive="active">
        Zarządzanie zamówieniami
      </a>

      <span *ngIf="authService.isLoggedIn()" class="user-info">
        {{ authService.getCurrentUser()?.email }}
      </span>

      <button *ngIf="authService.isLoggedIn()" class="logout-button" (click)="logout()">
        Wyloguj
      </button>
    </div>
  </div>
</nav>
